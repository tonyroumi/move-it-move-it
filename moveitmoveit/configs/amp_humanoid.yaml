device: cuda

networks: 
  actor:
    hidden_layers: [1024, 512]
    activation: relu
    ortho_init: true
    noise_std_type: fixed
    init_noise_std: 0.3

  critic:
    hidden_layers: [1024, 512]
    activation: relu

  discriminator:
    hidden_layers: [1024, 512]
    activation: relu

  obs_norm:
    clip: 5.0
    max_samples: 100000000


  disc_obs_norm:
    clip: 5.0
    max_samples: 100000000

  action_norm: {}

algorithm:
  name: amp 
  # ppo
  num_mini_batches: 4
  num_learning_epochs: 5
  clip_param: 0.2
  discount: 0.97
  td_lambda: 0.95
  lr: 3e-4
  max_grad_norm: 1.0
  use_clipped_value_loss: true
  desired_kl: 0.01
  normalize_advantage_per_mini_batch: false

  value_loss_coef: 1.0
  entropy_coef: 0.0

  # amp
  num_disc_obs_steps: 10
  discriminator_buffer_capacity: 200000
  disc_lr: 1e-4
  discriminator_update_interval: 4
  disc_update_epochs: 1
  disc_mini_batches: 4
  disc_grad_penalty_coef: 5.0

  style_reward_lambda: 0.5 
  goal_reward_lambda: 0.5

  #from MimicKit. mby for surroage loss ?
  action_bound_weight: 10.0
  #not used
  # exp_prob_beg: 1.0
  # exp_prob_end: 1.0
  #look into exp anneal samples

#opt they use:
#             optimizer = torch.optim.SGD(param_list, lr, momentum=0.9, weight_decay=weight_decay)
# single opt?

environment:
  id: "AMPEnv"
  type: "gym:cpu"
  num_envs: 3
  seed: 0

  kwargs:
    model_path: "models/humanoid.xml"
    motion_clips: ["test.npz"] 
    params:
      max_episode_time: 2.0 
      sim_freq: 120.0
      control_freq: 30.0

runner:
  num_transitions_per_env: 32 #32?

  total_timesteps: 500000
  log_interval: 10
  checkpoint_interval: 50
  checkpoint_ir: 5